<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Transactions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="transactions-page">
    <div class="finance-layout">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">finance</div>

        <nav class="sidebar-nav">
          <a class="sidebar-link" href="./index.html">Overview</a>
          <a class="sidebar-link sidebar-link-active" href="./transactions.html">Transactions</a>
          <a class="sidebar-link" href="./budgets.html">Budgets</a>
          <a class="sidebar-link" href="./pots.html">Pots</a>
          <a class="sidebar-link" href="./recurring-bills.html">Recurring bills</a>
        </nav>

        <button class="sidebar-minimize" type="button">Minimize Menu</button>
      </aside>

      <main class="transactions-main">
        <header class="transactions-header">
          <h1>Transactions</h1>
          <button id="openFormButton" class="add-transaction-btn" type="button">+Add New Transaction</button>
        </header>

        <section class="transactions-panel" aria-label="Transaction controls and table">
          <div id="transactionModal" class="transaction-modal hidden" aria-hidden="true">
            <form id="transactionForm" class="add-transaction-form transaction-modal-form" novalidate>
              <div class="transaction-modal-head">
                <h2>Add New Transaction</h2>
                <button id="closeFormButton" class="transaction-modal-close" type="button" aria-label="Close">
                  &times;
                </button>
              </div>

              <div class="form-grid transaction-modal-grid">
                <div>
                  <label for="description">Transaction Name</label>
                  <input id="description" name="description" type="text" required maxlength="60" placeholder="e.g Urban Services Hub" />
                </div>
                <div>
                  <label for="date">Transaction Date</label>
                  <input id="date" name="date" type="date" required />
                </div>
                <div>
                  <label for="category">Category</label>
                  <select id="category" name="category">
                    <option value="salary">Salary</option>
                    <option value="freelance">Freelance</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="bills">Bills</option>
                    <option value="shopping">Shopping</option>
                    <option value="health">Health</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div>
                  <label for="amount">Amount</label>
                  <input id="amount" name="amount" type="number" required min="0.01" step="0.01" placeholder="e.g 1000" />
                </div>
                <div>
                  <label for="type">Type</label>
                  <select id="type" name="type">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                  </select>
                </div>
                <div class="transaction-recurring-row">
                  <label for="isRecurring">Recurring</label>
                  <input id="isRecurring" name="isRecurring" type="checkbox" />
                </div>
              </div>

              <div class="form-actions transaction-modal-actions">
                <button id="cancelFormButton" class="secondary-btn" type="button">Cancel</button>
                <button class="primary-btn" type="submit">Submit</button>
              </div>
              <p id="formFeedback" role="status" aria-live="polite"></p>
            </form>
          </div>

          <div class="controls-row">
            <input
              id="searchText"
              class="search-input"
              type="search"
              placeholder="Search transaction"
              aria-label="Search transaction"
            />

            <div class="select-controls">
              <label for="sortBy">Sort by</label>
              <select id="sortBy" aria-label="Sort transactions">
                <option value="latest">Latest</option>
                <option value="oldest">Oldest</option>
                <option value="highest">Highest</option>
                <option value="lowest">Lowest</option>
              </select>
            </div>

            <div class="select-controls">
              <label for="filterCategory">Filter by Category</label>
              <select id="filterCategory" aria-label="Filter by category">
                <option value="all">All Transactions</option>
                <option value="salary">Salary</option>
                <option value="freelance">Freelance</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="bills">Bills</option>
                <option value="shopping">Shopping</option>
                <option value="health">Health</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <div class="table-wrap table-wrap-plain">
            <table class="transactions-table">
              <thead>
                <tr>
                  <th>Recipient / Sender</th>
                  <th>Category</th>
                  <th>Transaction Date</th>
                  <th class="amount-col">Amount</th>
                </tr>
              </thead>
              <tbody id="transactionBody"></tbody>
            </table>
          </div>

          <div class="pagination-row">
            <button id="prevPageButton" class="pager-btn" type="button">Prev</button>
            <p id="pageInfo" class="page-info">Page 1 of 1</p>
            <button id="nextPageButton" class="pager-btn" type="button">Next</button>
          </div>

          <template id="emptyStateTemplate">
            <tr>
              <td colspan="4" class="empty-state">No results.</td>
            </tr>
          </template>
        </section>
      </main>
    </div>

    <script type="module" src="./dist/app.js"></script>
  </body>
</html>
